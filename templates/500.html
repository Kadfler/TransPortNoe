<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ой, что-то пошло не так...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f9f9fb;
            color: #1e1e24;
            display: flex;
            align-content: center;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 450px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(45deg, #ff6b6b, #4dadf7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 1rem;
            color: #62626a;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #1e1e24;
            color: #ffffff;
            padding: 12px 24px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #31313a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="error-container">
    <div class="error-code" style="background: linear-gradient(45deg, #ff4757, #9b51e0); -webkit-background-clip: text;">500</div>
    <div class="error-title">Упс... Сервер приуныл</div>
    <div class="error-message">
        Что-то пошло сильно не так на нашей стороне. Мы уже выдали программистам по чашке кофе, они во всём разбираются.
    </div>
    <a href="/" class="btn">Обновить и верить в чудо</a>
</div>
    <a href="/" class="btn">Уйти подобру-поздорову</a>
</div>
    <a href="/" class="btn">Попробовать снова</a>
</div>

</body>
</html>
